<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log In — MaintenanceTracker</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --fg: #1c1b19;
      --fg-soft: #5b5a57;
      --border: #e7e5e4;
      --accent: #2f9e44;
      --accent-hover: #2b8a3e;
      --radius: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .auth-container {
      width: 100%;
      max-width: 420px;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .auth-logo-icon svg {
      width: 28px;
      height: 28px;
    }

    .auth-logo h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--fg);
    }

    .auth-logo p {
      font-size: 14px;
      color: var(--fg-soft);
      margin-top: 4px;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .auth-tab {
      flex: 1;
      padding: 12px;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--fg-soft);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: var(--font-sans);
      transition: color 0.15s, border-color 0.15s;
    }

    .auth-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .auth-form-group {
      margin-bottom: 16px;
    }

    .auth-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--fg);
      margin-bottom: 6px;
    }

    .auth-input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: var(--font-sans);
      color: var(--fg);
      background: var(--bg);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .auth-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47,158,68,0.12);
    }

    .auth-input::placeholder {
      color: #b8b6b2;
    }

    .auth-btn {
      width: 100%;
      padding: 11px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background 0.15s;
      margin-top: 4px;
    }

    .auth-btn:hover {
      background: var(--accent-hover);
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--fg-soft);
      font-size: 12px;
      font-weight: 500;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .oauth-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .oauth-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: background 0.15s, border-color 0.15s;
    }

    .oauth-btn:hover {
      background: var(--bg);
      border-color: #cccccc;
    }

    .oauth-btn svg {
      width: 18px;
      height: 18px;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--fg-soft);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .auth-error {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      font-size: 13px;
      color: #dc2626;
      margin-bottom: 16px;
    }

    @media (max-width: 480px) {
      .auth-card { padding: 24px 20px; }
      .oauth-btn { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
      <h1>MaintenanceTracker</h1>
      <p>Keep everything running smoothly</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="showTab('login')">Log in</button>
        <button class="auth-tab" onclick="showTab('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form">
        <div class="auth-error">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
          Invalid email or password. Please try again.
        </div>
        <div class="auth-form-group">
          <label class="auth-label" for="email">Email</label>
          <input class="auth-input" type="email" id="email" placeholder="jane@daves.com" />
        </div>
        <div class="auth-form-group">
          <label class="auth-label" for="password">Password</label>
          <input class="auth-input" type="password" id="password" placeholder="••••••••" />
        </div>
        <button type="submit" class="auth-btn">Log in</button>
      </form>

      <!-- Register Form (hidden by default) -->
      <form class="auth-form" id="register-form" style="display:none;">
        <div class="auth-form-group">
          <label class="auth-label" for="name">Full name</label>
          <input class="auth-input" type="text" id="name" placeholder="Jane Dave" />
        </div>
        <div class="auth-form-group">
          <label class="auth-label" for="email-reg">Email</label>
          <input class="auth-input" type="email" id="email-reg" placeholder="jane@daves.com" />
        </div>
        <div class="auth-form-group">
          <label class="auth-label" for="pass-reg">Password</label>
          <input class="auth-input" type="password" id="pass-reg" placeholder="At least 8 characters" />
        </div>
        <button type="submit" class="auth-btn">Create account</button>
      </form>

      <div class="auth-divider">or continue with</div>

      <div class="oauth-buttons">
        <button class="oauth-btn" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="oauth-btn" type="button">
          <svg viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          Facebook
        </button>
        <button class="oauth-btn" type="button">
          <svg viewBox="0 0 24 24" fill="black"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.5.31-3.46-.7C1.02 15.17 1.71 8.59 6.65 8.32c1.31.07 2.52.75 3.28 1.58.82-.78 2.06-1.34 3.28-1.37 1.23-.04 2.36.43 3.1 1.17-.02.01-1.63.96-1.61 2.77.03 2.2 1.9 2.98 1.94 3-.02.03-.31.97-.95 1.91zm-2.34-14.2c.63-1.59 1.78-2.93 3.36-3.08.26 1.78-.44 3.28-1.11 4.23-.59.82-1.88 1.48-3.25 1.57-.17-1.66.44-3.32.99-4.72z"/></svg>
          Apple
        </button>
      </div>
    </div>

    <div class="auth-footer">
      By logging in, you agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </div>
  </div>

  <script>
    function showTab(tab) {
      const tabs = document.querySelectorAll('.auth-tab');
      tabs.forEach(t => t.classList.remove('active'));
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      if (tab === 'login') { tabs[0].classList.add('active'); } else { tabs[1].classList.add('active'); }
    }
  </script>
</body>
</html>

apiVersion: v1
kind: Service
metadata:
  name: {{ include "steward.web.name" . }}
  labels:
    {{- include "steward.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.web.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "steward.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web

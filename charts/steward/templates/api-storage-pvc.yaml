apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "steward.api.name" . }}-storage
  labels:
    {{- include "steward.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  # ReadWriteMany (not ReadWriteOnce): the api Deployment does rolling updates, so the
  # incoming and outgoing pod can briefly both hold the volume. Requires an RWX-capable
  # storageClassName (e.g. NFS-backed).
  accessModes:
    - ReadWriteMany
  storageClassName: {{ .Values.api.storage.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.api.storage.size }}

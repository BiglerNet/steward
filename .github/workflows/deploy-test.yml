name: Deploy to Test

on:
  workflow_run:
    workflows:
      - Build and Push
    branches:
      - main
    types:
      - completed

jobs:
  deploy-test:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy to test
        env:
          KUBECONFIG_DATA: ${{ secrets.BIGLERNET_ONPREM_KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          SHA=${{ github.event.workflow_run.head_sha }}
          helm upgrade --install steward charts/steward \
            -n steward-test \
            --create-namespace \
            -f charts/steward/values-test.yaml \
            --set api.image.tag=sha-${SHA} \
            --set web.image.tag=sha-${SHA} \
            --wait \
            --timeout 5m

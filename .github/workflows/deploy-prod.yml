name: Deploy to Prod

on:
  release:
    types:
      - published

jobs:
  deploy-prod:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine commit SHA for release tag
        id: sha
        run: |
          SHA=$(git rev-list -n 1 ${{ github.event.release.tag_name }})
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Retag API image with release version
        run: |
          docker pull ghcr.io/biglernet/steward/api:sha-${{ steps.sha.outputs.sha }}
          docker tag ghcr.io/biglernet/steward/api:sha-${{ steps.sha.outputs.sha }} \
            ghcr.io/biglernet/steward/api:${{ github.event.release.tag_name }}
          docker push ghcr.io/biglernet/steward/api:${{ github.event.release.tag_name }}

      - name: Retag Web image with release version
        run: |
          docker pull ghcr.io/biglernet/steward/web:sha-${{ steps.sha.outputs.sha }}
          docker tag ghcr.io/biglernet/steward/web:sha-${{ steps.sha.outputs.sha }} \
            ghcr.io/biglernet/steward/web:${{ github.event.release.tag_name }}
          docker push ghcr.io/biglernet/steward/web:${{ github.event.release.tag_name }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Deploy to prod
        env:
          KUBECONFIG_DATA: ${{ secrets.BIGLERNET_ONPREM_KUBECONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          helm upgrade --install steward charts/steward \
            -n steward-prod \
            --create-namespace \
            -f charts/steward/values-prod.yaml \
            --set api.image.tag=${{ github.event.release.tag_name }} \
            --set web.image.tag=${{ github.event.release.tag_name }} \
            --wait \
            --timeout 10m

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build

      - name: Test (unit)
        run: dotnet test tests/Steward.UnitTests

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: src/Steward.Web/package-lock.json

      - name: Install frontend deps
        working-directory: src/Steward.Web
        run: npm ci

      - name: Build frontend
        working-directory: src/Steward.Web
        run: npm run build

      - name: Test frontend
        working-directory: src/Steward.Web
        run: npm test

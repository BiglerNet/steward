name: Build and Push

on:
  push:
    branches:
      - main

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest runners already have binfmt/QEMU handlers registered for
      # arm64; explicitly (re-)installing them via setup-qemu-action has been
      # observed to swap in a QEMU build that SIGILLs on Node's arm64 JIT.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Steward.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/biglernet/steward/api:sha-${{ github.sha }}
            ghcr.io/biglernet/steward/api:latest

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: src/Steward.Web
          file: src/Steward.Web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/biglernet/steward/web:sha-${{ github.sha }}
            ghcr.io/biglernet/steward/web:latest
